<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Tasks — Качество кода</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap");

      :root {
        --bg: #0a0a0f;
        --surface: #13131a;
        --card: #1a1a25;
        --border: #2a2a3d;
        --accent: #f97316;
        --accent2: #facc15;
        --accent3: #4ade80;
        --accent4: #38bdf8;
        --accent5: #ef4444;
        --accent6: #c084fc;
        --text: #e2e8f0;
        --muted: #64748b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(
            ellipse at 10% 30%,
            rgba(249, 115, 22, 0.08) 0%,
            transparent 45%
          ),
          radial-gradient(
            ellipse at 90% 70%,
            rgba(250, 204, 21, 0.06) 0%,
            transparent 45%
          ),
          radial-gradient(
            ellipse at 55% 10%,
            rgba(192, 132, 252, 0.05) 0%,
            transparent 40%
          );
        animation: bgPulse 22s ease-in-out infinite alternate;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes bgPulse {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(1%, 2%) scale(1.02);
        }
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        position: relative;
        z-index: 1;
      }

      /* ── HEADER ── */
      header {
        padding: 64px 20px 44px;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, #f97316, #facc15);
        color: #0a0a0f;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        padding: 7px 18px;
        border-radius: 20px;
        margin-bottom: 22px;
      }

      h1 {
        font-size: clamp(2.4rem, 6vw, 4.8rem);
        font-weight: 900;
        line-height: 1.08;
        background: linear-gradient(135deg, #fff 0%, #f97316 40%, #facc15 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 14px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 1.05rem;
        margin-bottom: 44px;
        line-height: 1.6;
      }

      /* ── STATS ── */
      .stats {
        display: flex;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 48px;
      }

      .stat-chip {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 11px 18px;
        display: flex;
        align-items: center;
        gap: 9px;
        font-size: 0.88rem;
      }

      .stat-chip .num {
        font-size: 1.35rem;
        font-weight: 700;
        color: var(--accent);
      }

      /* ── PROGRESS ── */
      .progress-wrap {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px 24px;
        margin-bottom: 36px;
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
      }

      .progress-label {
        font-weight: 600;
        font-size: 0.93rem;
        white-space: nowrap;
      }
      .progress-bar-outer {
        flex: 1;
        min-width: 180px;
        height: 8px;
        background: var(--border);
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-bar-inner {
        height: 100%;
        background: linear-gradient(90deg, #f97316, #facc15);
        border-radius: 4px;
        transition: width 0.4s ease;
      }
      .progress-count {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.88rem;
        color: var(--accent);
        white-space: nowrap;
      }

      .btn-reset {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px 15px;
        color: var(--muted);
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        transition: all 0.2s;
      }
      .btn-reset:hover {
        border-color: var(--accent5);
        color: var(--accent5);
      }

      /* ── CONTROLS ── */
      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 44px;
        flex-wrap: wrap;
        align-items: center;
      }

      .search-wrap {
        flex: 1;
        min-width: 240px;
        position: relative;
      }

      .search-wrap input {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 11px 16px 11px 42px;
        color: var(--text);
        font-family: "Inter", sans-serif;
        font-size: 0.93rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .search-wrap input:focus {
        border-color: var(--accent);
      }
      .search-wrap::before {
        content: "🔍";
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
      }

      .filter-btn {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px 15px;
        color: var(--muted);
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .filter-btn:hover,
      .filter-btn.active {
        border-color: var(--accent);
        color: #fff;
        background: rgba(249, 115, 22, 0.15);
      }

      /* ── TOPIC SECTION ── */
      .topic-section {
        margin-bottom: 64px;
      }

      .topic-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 22px;
        padding: 16px 0;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: var(--bg);
        z-index: 10;
      }

      .topic-icon {
        width: 50px;
        height: 50px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        flex-shrink: 0;
      }

      .topic-title {
        font-size: 1.35rem;
        font-weight: 700;
      }

      .topic-meta {
        margin-left: auto;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
      }

      .topic-count {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        color: var(--muted);
        background: var(--surface);
        padding: 4px 11px;
        border-radius: 20px;
        border: 1px solid var(--border);
      }

      /* ── GRID ── */
      .task-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 14px;
      }

      /* ── CARD ── */
      .task-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        transition: all 0.22s;
        position: relative;
        overflow: hidden;
      }

      .task-card::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 16px;
        background: radial-gradient(
          circle at 50% 0%,
          var(--card-glow, rgba(249, 115, 22, 0.06)) 0%,
          transparent 70%
        );
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }

      .task-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          var(--card-color, #f97316),
          transparent
        );
        opacity: 0;
        transition: opacity 0.22s;
      }

      .task-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 36px rgba(0, 0, 0, 0.32);
      }
      .task-card:hover::before,
      .task-card:hover::after {
        opacity: 1;
      }

      .task-card.done {
        background: rgba(74, 222, 128, 0.06);
        border-color: rgba(74, 222, 128, 0.28);
      }
      .task-card.done::before {
        opacity: 1;
        background: linear-gradient(90deg, #4ade80, transparent);
      }

      .task-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 13px;
      }

      .task-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.73rem;
        color: var(--muted);
        background: var(--surface);
        padding: 3px 8px;
        border-radius: 6px;
      }

      .difficulty {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        padding: 3px 10px;
        border-radius: 20px;
      }
      .diff-easy {
        background: rgba(74, 222, 128, 0.13);
        color: #4ade80;
      }
      .diff-medium {
        background: rgba(250, 204, 21, 0.13);
        color: #facc15;
      }
      .diff-hard {
        background: rgba(239, 68, 68, 0.13);
        color: #ef4444;
      }

      .task-text {
        font-size: 0.92rem;
        line-height: 1.68;
        color: var(--text);
        margin-bottom: 14px;
      }

      .task-text code {
        font-family: "JetBrains Mono", monospace;
        background: var(--surface);
        color: #f97316;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.84em;
      }

      .code-block {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.77rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        color: #94a3b8;
        margin-bottom: 14px;
        white-space: pre;
        overflow-x: auto;
        line-height: 1.65;
      }

      .task-actions {
        display: flex;
        gap: 8px;
        margin-top: 6px;
      }

      .btn-done {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 15px;
        color: var(--muted);
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 0.79rem;
        font-weight: 600;
        transition: all 0.2s;
      }
      .btn-done:hover {
        border-color: #4ade80;
        color: #4ade80;
      }
      .task-card.done .btn-done {
        background: rgba(74, 222, 128, 0.1);
        border-color: #4ade80;
        color: #4ade80;
      }

      /* ── FLOAT ── */
      .float-counter {
        position: fixed;
        bottom: 28px;
        right: 28px;
        background: linear-gradient(135deg, #f97316, #facc15);
        border-radius: 20px;
        padding: 13px 22px;
        font-weight: 700;
        font-size: 0.95rem;
        color: #0a0a0f;
        box-shadow: 0 8px 32px rgba(249, 115, 22, 0.45);
        z-index: 100;
        transition: transform 0.2s;
      }
      .float-counter:hover {
        transform: scale(1.06);
      }

      .hidden {
        display: none !important;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
      }

      @media (max-width: 640px) {
        .task-grid {
          grid-template-columns: 1fr;
        }
        h1 {
          font-size: 2.3rem;
        }
        .float-counter {
          bottom: 14px;
          right: 14px;
          padding: 10px 16px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="badge">✦ JavaScript Practice</div>
      <h1>100 заданий<br />Качество кода</h1>
      <p class="subtitle">
        Отладка · Стиль · Комментарии · Ниндзя-код · Mocha · Полифилы
      </p>
      <div class="stats">
        <div class="stat-chip"><span class="num">100</span>&nbsp;заданий</div>
        <div class="stat-chip"><span class="num">7</span>&nbsp;тем</div>
        <div class="stat-chip">
          <span class="num" id="easyCount">0</span>&nbsp;лёгких
        </div>
        <div class="stat-chip">
          <span class="num" id="medCount">0</span>&nbsp;средних
        </div>
        <div class="stat-chip">
          <span class="num" id="hardCount">0</span>&nbsp;сложных
        </div>
      </div>
    </header>

    <div class="container">
      <div class="progress-wrap">
        <span class="progress-label">⚡ Прогресс</span>
        <div class="progress-bar-outer">
          <div
            class="progress-bar-inner"
            id="progressBar"
            style="width: 0%"
          ></div>
        </div>
        <span class="progress-count" id="progressText">0 / 100</span>
        <button class="btn-reset" onclick="resetAll()">Сбросить</button>
      </div>

      <div class="controls">
        <div class="search-wrap">
          <input
            type="text"
            id="searchInput"
            placeholder="Поиск задания..."
            oninput="filterTasks()"
          />
        </div>
        <button class="filter-btn active" onclick="setFilter('all', this)">
          Все
        </button>
        <button class="filter-btn" onclick="setFilter('easy', this)">
          Лёгкие
        </button>
        <button class="filter-btn" onclick="setFilter('medium', this)">
          Средние
        </button>
        <button class="filter-btn" onclick="setFilter('hard', this)">
          Сложные
        </button>
        <button class="filter-btn" onclick="setFilter('done', this)">
          Выполненные
        </button>
        <button class="filter-btn" onclick="setFilter('undone', this)">
          Невыполненные
        </button>
      </div>

      <div id="tasksRoot"></div>
    </div>

    <div class="float-counter" id="floatCounter">✅ 0 / 100</div>

    <script>
      const TOPICS = [
        {
          id: "debug",
          title: "Отладка в браузере",
          icon: "🐛",
          color: "#38bdf8",
          tasks: [
            { d: "easy",   t: "DevTools — встроенные инструменты разработчика в браузере. Вкладка Sources открывается через F12 → Sources или Ctrl+Shift+S (Win) / Cmd+Opt+S (Mac)." },
            { d: "easy",   t: "Оператор <code>debugger;</code> приостанавливает выполнение JS-кода, если открыты DevTools → автоматически открывает отладчик на этой строке." },
            { d: "easy",   t: "Клик по номеру строки в Sources → появляется синий маркер. При остановке выполнение JS приостанавливается, можно смотреть переменные, стек вызовов." },
            { d: "easy",   t: "Step Over (F10) — следующий шаг, не заходя в функции.<br>Step Into (F11) — заходит внутрь вызываемой функции.<br>Step Out (Shift+F11) — выходит из текущей функции." },
            { d: "easy",   t: "Навести курсор на переменную → всплывает значение, либо в Scope-панели слева, либо добавить в Watch." },
            { d: "easy",   t: "Watch — панель, куда можно добавлять выражения/переменные, значения которых будут обновляться при каждом шаге отладки." },
            { d: "medium", t: "Conditional breakpoint: правый клик по номеру строки → Add conditional breakpoint → ввести условие, например <code>i > 5</code>." },
            { d: "medium", t: "Вкладка Console позволяет писать и выполнять любой JS-код в контексте текущей страницы (переменные, DOM и т.д. доступны)." },
            { d: "medium", t: "Call Stack показывает текущий стек вызовов функций — сверху текущая функция, ниже — кто её вызвал и т.д." },
            { d: "medium", t: "<code>console.table(arrOfObjects)</code> выводит массив объектов в виде красивой таблицы с колонками." },
            { d: "medium", t: "Logpoint — breakpoint, который вместо остановки просто выводит в консоль заданное значение (правый клик → Logpoint)." },
            { d: "medium", t: "Async call stack отображается в Sources → Async (стрелочка вниз). Можно включить «Async» в Call Stack для показа промисов/await." },
            { d: "hard",   t: "Blackboxing — исключение файлов/папок из отладки (например node_modules, vendor). Правый клик на файл → Blackbox Script." },
            { d: "hard",   t: "Performance → Record → flame graph показывает, какие функции занимают больше всего времени (ширина = длительность)." },
            { d: "hard",   t: "Memory → Heap Snapshot → сравнивать снимки до/после действия → искать объекты, которые не должны расти (утечки)." },
          ],
        },

        {
          id: "style",
          title: "Советы по стилю кода",
          icon: "✨",
          color: "#f97316",
          tasks: [
            { d: "easy",   t: "Единый code style делает код предсказуемым, ускоряет чтение и ревью, снижает количество споров в команде." },
            { d: "easy",   t: "camelCase — переменные, функции (userName).<br>PascalCase — классы, компоненты (UserProfile).<br>SNAKE_CASE — редко, обычно константы (API_KEY)." },
            { d: "easy",   t: "ESLint — линтер, проверяет стиль + потенциальные ошибки. Настраивается через .eslintrc и плагины." },
            { d: "easy",   t: "Prettier — опинионативный форматтер (автоматически расставляет отступы, переносы, кавычки). ESLint — про качество и логику." },
            { d: "easy",   t: "80–100 символов — самый популярный лимит. Помогает читать код на любом экране и в ревью." },
            { d: "easy",   t: "<pre><code>[*.{js,ts,jsx,tsx}]\nindent_size = 2\nend_of_line = lf\ncharset = utf-8\ntrim_trailing_whitespace = true\ninsert_final_newline = true</code></pre>" },
            { d: "medium", t: "Функция должна делать одну вещь на одном уровне абстракции.<br>Плохо: валидация + запрос + обработка.<br>Хорошо: разбить на validateInput(), fetchData(), formatResult()." },
            { d: "medium", t: "Магические числа — голые 42, 1000, 0.5 без объяснения. Решение: константы MAX_RETRIES = 5; TAX_RATE = 0.2;" },
            { d: "medium", t: "DRY: не повторять одинаковую логику. Пример: вынести дублирующуюся валидацию email в отдельную функцию." },
            { d: "medium", t: "KISS: проще = лучше. Избегать ненужных абстракций, сложных тернарных выражений, ненужных паттернов." },
            { d: "medium", t: "Глубокая вложенность → сложно читать. Решения: early return, guard clauses, вынос в отдельные функции." },
            { d: "medium", t: "Хорошо: isLoading, hasError, canSubmit.<br>Плохо: flag, ok, x, loaded." },
            { d: "hard",   t: "<code>no-shadow</code> запрещает переобъявлять переменные во вложенных скоупах — может привести к багам из-за путаницы." },
            { d: "hard",   t: "Early return — возвращать результат сразу, как только он известен. Уменьшает вложенность if-else." },
            { d: "hard",   t: "ESLint + Prettier → eslint-config-prettier, eslint-plugin-prettier.<br>husky + lint-staged → проверка только изменённых файлов перед коммитом." },
          ],
        },

        {
          id: "comments",
          title: "Комментарии",
          icon: "💬",
          color: "#c084fc",
          tasks: [
            { d: "easy",   t: "<code>//</code> — до конца строки.<br><code>/* */</code> — многострочный, может быть внутри строки." },
            { d: "easy",   t: "<pre><code>/** Суммирует два числа\n * @param {number} a Первое слагаемое\n * @param {number} b Второе слагаемое\n * @returns {number} Сумма\n */</code></pre>" },
            { d: "easy",   t: "<code>@param</code> — описание параметра.<br><code>@returns</code> — описание возвращаемого значения." },
            { d: "easy",   t: "«Почему» объясняет бизнес-логику / компромисс / хак. «Что» обычно видно из кода, если он читаем." },
            { d: "easy",   t: "<code>// TODO: переписать на async/await после миграции на Node 18</code>" },
            { d: "medium", t: "Комментарий <code>// увеличиваем на 1</code> перед <code>i++</code> — бесполезен. Код должен быть понятен без комментариев." },
            { d: "medium", t: "Плохо: <code>// получаем данные</code><br>Хорошо: <code>const userOrders = await fetchUserOrders(user.id);</code>" },
            { d: "medium", t: "<code>@deprecated</code>, <code>@throws</code>, <code>@example</code> — устарела, кидает ошибку, пример использования." },
            { d: "medium", t: "Хорошие комментарии объясняют намерение и компромиссы → ревью проходит быстрее." },
            { d: "hard",   t: "JSDoc 3 → <code>jsdoc src/**/*.js</code>.<br>TypeDoc — более современный, особенно с TypeScript." },
            { d: "hard",   t: "Literate programming — код и документация в одном документе (markdown + код). Идея: документация первично важнее кода." },
          ],
        },

        {
          id: "ninja",
          title: "Ниндзя-код",
          icon: "🥷",
          color: "#ef4444",
          tasks: [
            { d: "easy",   t: "Намеренно запутанный, трудно читаемый код. Усложняет поддержку, ревью и поиск багов." },
            { d: "easy",   t: "Однобуквенные имена почти всегда плохи. Допустимы: i, j в коротких циклах; x, y в геометрии." },
            { d: "easy",   t: "<code>usr</code>, <code>btn</code>, <code>cfg</code> вместо понятных имён → ухудшают читаемость." },
            { d: "easy",   t: "Одна переменная для разных смыслов → сложно отследить, где что лежит → источник багов." },
            { d: "easy",   t: "Один умный однострочник вместо читаемого кода часто хуже — сложнее дебажить и поддерживать." },
            { d: "medium", t: "<code>_private</code> — условная договорённость. Но <code>__very__important__</code> — просто шум." },
            { d: "medium", t: "Меняет поведение встроенных объектов → ломает сторонние библиотеки, конфликты версий." },
            { d: "medium", t: "<code>if (user && (user.age = 18)) { ... }</code> — присваивание вместо сравнения → баг + сложно читать." },
            { d: "medium", t: "Лучше возвращать один тип или union с явной проверкой. Избегать сюрпризов." },
            { d: "hard",   t: "Тернарный оператор без пробелов + отсутствие return в ветках + непонятные имена → классический ниндзя-код." },
            { d: "hard",   t: "Обфускация — намеренное усложнение чтения человеком. Минификация — просто уменьшение размера. Обфускация нужна редко (защита проприетарного кода)." },
          ],
        },

        {
          id: "mocha",
          title: "Автотестирование с Mocha",
          icon: "☕",
          color: "#4ade80",
          tasks: [
            { d: "easy",   t: "Автоматические тесты проверяют, что код работает как ожидается → ловят регрессии, дают уверенность при рефакторинге." },
            { d: "easy",   t: "Mocha — тестовый фреймворк (describe/it). Jest — более «всё-в-одном» (встроенный assert, mocks, coverage)." },
            { d: "easy",   t: "<code>describe('sum', () => { it('2+3=5', () => { assert.equal(sum(2,3),5) }) })</code>" },
            { d: "easy",   t: "<code>assert.equal</code> — приводит типы.<br><code>assert.strictEqual</code> — строгое равенство (===)." },
            { d: "easy",   t: "Chai — библиотека утверждений (expect, should, assert). Подключается через <code>import { expect } from 'chai'</code>." },
            { d: "easy",   t: "<code>expect(sum(2,3)).to.equal(5)</code>" },
            { d: "easy",   t: "BDD — Behavior Driven: describe → контекст, it → конкретный сценарий, expect → утверждение." },
            { d: "easy",   t: "before/after — один раз перед/после всего describe.<br>beforeEach/afterEach — перед/после каждого it." },
            { d: "medium", t: "TDD: 1) пишем падающий тест (Red), 2) делаем минимум кода чтобы прошёл (Green), 3) рефакторим (Refactor)." },
            { d: "medium", t: "Тесты на 0, 1, отрицательное число, не-число → assert.equal(factorial(0), 1), throws при NaN и т.д." },
            { d: "medium", t: "Test coverage — % строк/веток, покрытых тестами. nyc / c8 / istanbul — популярные инструменты." },
            { d: "medium", t: "Stub — подмена функции с фиксированным ответом. Mock — проверяет, что функция вызвана с нужными аргументами." },
            { d: "medium", t: "Callback: done().<br>Promise: return promise или async/await + await expect(...).rejected" },
            { d: "medium", t: "<code>it.only</code> — только этот тест.<br><code>it.skip</code> — пропустить тест." },
            { d: "medium", t: "<code>expect(() => fn(123)).to.throw(/Invalid argument/)</code>" },
            { d: "medium", t: "Обычно: test/ или __tests__/ + по структуре src/ + index.test.js / *.test.js" },
            { d: "hard",   t: "Snapshot — сохраняет результат рендера/данных. Плюс: быстро. Минус: сложно понять, что именно сломалось." },
            { d: "hard",   t: "Dependency injection (передавать зависимости через параметры) + sinon.stub() / jest.spyOn()." },
            { d: "hard",   t: "Property-based: генерировать тысячи случайных входных данных и проверять инварианты (fast-check, jsverify)." },
            { d: "hard",   t: "GitHub Actions → workflow с npm test / mocha + coverage report → Codecov / Coveralls." },
          ],
        },

        {
          id: "polyfills",
          title: "Полифилы",
          icon: "🔧",
          color: "#facc15",
          tasks: [
            { d: "easy",   t: "Полифил — код, который добавляет современную функциональность в старые браузеры." },
            { d: "easy",   t: "Полифил реализует API.<br>Транспайлер (Babel) преобразует синтаксис (class → function)." },
            { d: "easy",   t: "<code>if (!Array.prototype.includes) { ... }</code> или <code>if (typeof Promise === 'undefined')</code>" },
            { d: "easy",   t: "<pre><code>if (!Array.prototype.includes) {\n  Array.prototype.includes = function(search, from) {\n    return this.indexOf(search, from) !== -1;\n  };\n}</code></pre>" },
            { d: "easy",   t: "core-js — самая популярная библиотека полифилов. <code>import 'core-js/features/array/includes'</code>" },
            { d: "easy",   t: "<code>@babel/preset-env</code> сам решает, какие полифилы нужны, на основе browserslist." },
            { d: "medium", t: "Рекурсивно проходиться по массиву и объединять вложенные массивы на один уровень." },
            { d: "medium", t: "Проверять, есть ли нативный Object.assign, если нет — реализовать через цикл for…in + hasOwnProperty." },
            { d: "medium", t: "browserslist определяет целевые браузеры → Babel + core-js добавляют только нужные полифилы." },
            { d: "medium", t: "then, catch, finally, Promise.all, Promise.race, Promise.allSettled, Promise.any + resolve/reject." },
            { d: "medium", t: "<code>useBuiltIns: 'usage'</code> — Babel сам добавляет import полифилов там, где используются фичи." },
            { d: "medium", t: "Shim — просто заглушка (часто пустая).<br>Polyfill — полноценная реализация." },
            { d: "hard",   t: "flatMap = map + flat. Реализовать через reduce или рекурсию." },
            { d: "hard",   t: "<code>const globalThis = (function() { return this || self || global || window })()</code> + проверки." },
            { d: "hard",   t: "Scoped polyfill: (function(){ ... прототипы ... }).call({}); — не трогает глобальный объект." },
          ],
        },
      ];

      const STORAGE_KEY = "jsTasks4_done";
      let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      let currentFilter = "all";
      let searchQuery = "";
      const TOTAL = 100;

      function renderAll() {
        const root = document.getElementById("tasksRoot");
        root.innerHTML = "";

        let easy = 0,
          med = 0,
          hard = 0;
        TOPICS.forEach((t) =>
          t.tasks.forEach((tk) => {
            if (tk.d === "easy") easy++;
            else if (tk.d === "medium") med++;
            else hard++;
          }),
        );
        document.getElementById("easyCount").textContent = easy;
        document.getElementById("medCount").textContent = med;
        document.getElementById("hardCount").textContent = hard;

        let num = 0;
        TOPICS.forEach((topic) => {
          const sec = document.createElement("section");
          sec.className = "topic-section";

          const hdr = document.createElement("div");
          hdr.className = "topic-header";
          hdr.innerHTML = `
      <div class="topic-icon" style="background:${topic.color}1a;color:${topic.color}">${topic.icon}</div>
      <span class="topic-title">${topic.title}</span>
      <div class="topic-meta">
        <span class="topic-count">${topic.tasks.length} заданий</span>
      </div>
    `;
          sec.appendChild(hdr);

          const grid = document.createElement("div");
          grid.className = "task-grid";

          topic.tasks.forEach((task, i) => {
            num++;
            const id = `${topic.id}_${i}`;
            const isDone = !!done[id];

            const card = document.createElement("div");
            card.className = "task-card" + (isDone ? " done" : "");
            card.style.setProperty("--card-color", topic.color);
            card.style.setProperty("--card-glow", `${topic.color}0f`);
            card.dataset.diff = task.d;
            card.dataset.done = isDone ? "1" : "0";
            card.dataset.text = task.t.replace(/<[^>]+>/g, "").toLowerCase();

            const labels = {
              easy: "Лёгкое",
              medium: "Среднее",
              hard: "Сложное",
            };
            const classes = {
              easy: "diff-easy",
              medium: "diff-medium",
              hard: "diff-hard",
            };

            card.innerHTML = `
        <div class="task-top">
          <span class="task-num">#${String(num).padStart(3, "0")}</span>
          <span class="difficulty ${classes[task.d]}">${labels[task.d]}</span>
        </div>
        <div class="task-text">${task.t}</div>
        ${task.code ? `<div class="code-block">${task.code}</div>` : ""}
        <div class="task-actions">
          <button class="btn-done" onclick="toggleDone('${id}',this)">
            ${isDone ? "✅ Сделано" : "○ Выполнено"}
          </button>
        </div>
      `;
            grid.appendChild(card);
          });

          sec.appendChild(grid);
          root.appendChild(sec);
        });

        updateProgress();
        applyFilter();
      }

      function toggleDone(id, btn) {
        done[id] = !done[id];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
        const card = btn.closest(".task-card");
        card.classList.toggle("done", done[id]);
        card.dataset.done = done[id] ? "1" : "0";
        btn.innerHTML = done[id] ? "✅ Сделано" : "○ Выполнено";
        updateProgress();
      }

      function updateProgress() {
        const cnt = Object.values(done).filter(Boolean).length;
        const pct = ((cnt / TOTAL) * 100).toFixed(1);
        document.getElementById("progressBar").style.width = pct + "%";
        document.getElementById("progressText").textContent =
          `${cnt} / ${TOTAL}`;
        document.getElementById("floatCounter").textContent =
          `✅ ${cnt} / ${TOTAL}`;
      }

      function setFilter(f, btn) {
        currentFilter = f;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        applyFilter();
      }

      function filterTasks() {
        searchQuery = document
          .getElementById("searchInput")
          .value.toLowerCase();
        applyFilter();
      }

      function applyFilter() {
        document.querySelectorAll(".task-card").forEach((card) => {
          let show = true;
          const d = card.dataset.diff;
          const dn = card.dataset.done === "1";
          if (currentFilter === "easy") show = d === "easy";
          else if (currentFilter === "medium") show = d === "medium";
          else if (currentFilter === "hard") show = d === "hard";
          else if (currentFilter === "done") show = dn;
          else if (currentFilter === "undone") show = !dn;
          if (searchQuery && !card.dataset.text.includes(searchQuery))
            show = false;
          card.classList.toggle("hidden", !show);
        });

        document.querySelectorAll(".topic-section").forEach((sec) => {
          const vis = [...sec.querySelectorAll(".task-card")].some(
            (c) => !c.classList.contains("hidden"),
          );
          sec.classList.toggle("hidden", !vis);
        });
      }

      function resetAll() {
        if (confirm("Сбросить весь прогресс?")) {
          done = {};
          localStorage.removeItem(STORAGE_KEY);
          renderAll();
        }
      }

      renderAll();
    </script>
  </body>
</html>
