<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Ответы — Объекты</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap");

      :root {
        --bg: #0a0a0f;
        --surface: #13131a;
        --card: #1a1a25;
        --border: #2a2a3d;
        --accent: #06b6d4;
        --accent2: #818cf8;
        --accent3: #f59e0b;
        --accent4: #10b981;
        --accent5: #ef4444;
        --accent6: #f472b6;
        --text: #e2e8f0;
        --muted: #64748b;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(
            ellipse at 15% 25%,
            rgba(6, 182, 212, 0.08) 0%,
            transparent 45%
          ),
          radial-gradient(
            ellipse at 85% 70%,
            rgba(129, 140, 248, 0.07) 0%,
            transparent 45%
          ),
          radial-gradient(
            ellipse at 50% 10%,
            rgba(244, 114, 182, 0.04) 0%,
            transparent 40%
          );
        animation: bgPulse 22s ease-in-out infinite alternate;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes bgPulse {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(1%, 2%) scale(1.02);
        }
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        position: relative;
        z-index: 1;
      }

      header {
        padding: 64px 20px 44px;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, #06b6d4, #818cf8);
        color: #fff;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        padding: 7px 18px;
        border-radius: 20px;
        margin-bottom: 22px;
      }

      h1 {
        font-size: clamp(2.4rem, 6vw, 4.8rem);
        font-weight: 900;
        line-height: 1.08;
        background: linear-gradient(135deg, #fff 0%, #06b6d4 45%, #818cf8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 14px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 1.05rem;
        margin-bottom: 44px;
        line-height: 1.6;
      }

      .stats {
        display: flex;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 48px;
      }

      .stat-chip {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 11px 18px;
        display: flex;
        align-items: center;
        gap: 9px;
        font-size: 0.88rem;
      }
      .stat-chip .num {
        font-size: 1.35rem;
        font-weight: 700;
        color: var(--accent);
      }

      .progress-wrap {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px 24px;
        margin-bottom: 36px;
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
      }
      .progress-label {
        font-weight: 600;
        font-size: 0.93rem;
        white-space: nowrap;
      }
      .progress-bar-outer {
        flex: 1;
        min-width: 180px;
        height: 8px;
        background: var(--border);
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-bar-inner {
        height: 100%;
        background: linear-gradient(90deg, #06b6d4, #818cf8);
        border-radius: 4px;
        transition: width 0.4s ease;
      }
      .progress-count {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.88rem;
        color: var(--accent);
        white-space: nowrap;
      }

      .btn-reset {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px 15px;
        color: var(--muted);
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        transition: all 0.2s;
      }
      .btn-reset:hover {
        border-color: var(--accent5);
        color: var(--accent5);
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 44px;
        flex-wrap: wrap;
        align-items: center;
      }

      .search-wrap {
        flex: 1;
        min-width: 240px;
        position: relative;
      }
      .search-wrap input {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 11px 16px 11px 42px;
        color: var(--text);
        font-family: "Inter", sans-serif;
        font-size: 0.93rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .search-wrap input:focus {
        border-color: var(--accent);
      }
      .search-wrap::before {
        content: "🔍";
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
      }

      .filter-btn {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px 15px;
        color: var(--muted);
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .filter-btn:hover,
      .filter-btn.active {
        border-color: var(--accent);
        color: #fff;
        background: rgba(6, 182, 212, 0.15);
      }

      .topic-section {
        margin-bottom: 64px;
      }

      .topic-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 22px;
        padding: 16px 0;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: var(--bg);
        z-index: 10;
      }

      .topic-icon {
        width: 50px;
        height: 50px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        flex-shrink: 0;
      }

      .topic-title {
        font-size: 1.35rem;
        font-weight: 700;
      }

      .topic-count {
        margin-left: auto;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        color: var(--muted);
        background: var(--surface);
        padding: 4px 11px;
        border-radius: 20px;
        border: 1px solid var(--border);
      }

      .task-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 14px;
      }

      .task-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        transition: all 0.22s;
        position: relative;
        overflow: hidden;
      }

      .task-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          var(--card-color, #06b6d4),
          transparent
        );
        opacity: 0;
        transition: opacity 0.22s;
      }

      .task-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 36px rgba(0, 0, 0, 0.32);
        border-color: var(--card-color, #06b6d4);
      }
      .task-card:hover::before {
        opacity: 1;
      }

      .task-card.done {
        background: rgba(16, 185, 129, 0.06);
        border-color: rgba(16, 185, 129, 0.28);
      }
      .task-card.done::before {
        opacity: 1;
        background: linear-gradient(90deg, #10b981, transparent);
      }

      .task-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 13px;
      }

      .task-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.73rem;
        color: var(--muted);
        background: var(--surface);
        padding: 3px 8px;
        border-radius: 6px;
      }

      .difficulty {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        padding: 3px 10px;
        border-radius: 20px;
      }
      .diff-easy {
        background: rgba(16, 185, 129, 0.13);
        color: #10b981;
      }
      .diff-medium {
        background: rgba(245, 158, 11, 0.13);
        color: #f59e0b;
      }
      .diff-hard {
        background: rgba(239, 68, 68, 0.13);
        color: #ef4444;
      }

      .question-text {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 8px;
        font-style: italic;
      }

      .answer-text {
        font-size: 0.95rem;
        line-height: 1.68;
        color: var(--text);
        margin-bottom: 14px;
        font-weight: 500;
      }
      
      .answer-text code {
        font-family: "JetBrains Mono", monospace;
        background: var(--surface);
        color: #06b6d4;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.84em;
      }

      .code-block {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.77rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        color: #94a3b8;
        margin-bottom: 14px;
        white-space: pre;
        overflow-x: auto;
        line-height: 1.65;
      }

      .task-actions {
        display: flex;
        gap: 8px;
        margin-top: 6px;
      }

      .btn-done {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 15px;
        color: var(--muted);
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 0.79rem;
        font-weight: 600;
        transition: all 0.2s;
      }
      .btn-done:hover {
        border-color: #10b981;
        color: #10b981;
      }
      .task-card.done .btn-done {
        background: rgba(16, 185, 129, 0.1);
        border-color: #10b981;
        color: #10b981;
      }

      .float-counter {
        position: fixed;
        bottom: 28px;
        right: 28px;
        background: linear-gradient(135deg, #06b6d4, #818cf8);
        border-radius: 20px;
        padding: 13px 22px;
        font-weight: 700;
        font-size: 0.95rem;
        color: #fff;
        box-shadow: 0 8px 32px rgba(6, 182, 212, 0.4);
        z-index: 100;
        transition: transform 0.2s;
      }
      .float-counter:hover {
        transform: scale(1.06);
      }

      .hidden {
        display: none !important;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
      }

      @media (max-width: 640px) {
        .task-grid {
          grid-template-columns: 1fr;
        }
        h1 {
          font-size: 2.3rem;
        }
        .float-counter {
          bottom: 14px;
          right: 14px;
          padding: 10px 16px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="badge">✦ JavaScript Answers</div>
      <h1>200 ответов<br />Объекты</h1>
      <p class="subtitle">
        Основы · Копирование · Сборка мусора · this · new · ?. · Symbol ·
        Преобразования
      </p>
      <div class="stats">
        <div class="stat-chip"><span class="num">200</span>&nbsp;ответов</div>
        <div class="stat-chip"><span class="num">9</span>&nbsp;тем</div>
        <div class="stat-chip">
          <span class="num" id="easyCount">0</span>&nbsp;лёгких
        </div>
        <div class="stat-chip">
          <span class="num" id="medCount">0</span>&nbsp;средних
        </div>
        <div class="stat-chip">
          <span class="num" id="hardCount">0</span>&nbsp;сложных
        </div>
      </div>
    </header>

    <div class="container">
      <div class="progress-wrap">
        <span class="progress-label">⚡ Прогресс изучения</span>
        <div class="progress-bar-outer">
          <div
            class="progress-bar-inner"
            id="progressBar"
            style="width: 0%"
          ></div>
        </div>
        <span class="progress-count" id="progressText">0 / 200</span>
        <button class="btn-reset" onclick="resetAll()">Сбросить</button>
      </div>

      <div class="controls">
        <div class="search-wrap">
          <input
            type="text"
            id="searchInput"
            placeholder="Поиск ответов..."
            oninput="filterTasks()"
          />
        </div>
        <button class="filter-btn active" onclick="setFilter('all', this)">
          Все
        </button>
        <button class="filter-btn" onclick="setFilter('easy', this)">
          Лёгкие
        </button>
        <button class="filter-btn" onclick="setFilter('medium', this)">
          Средние
        </button>
        <button class="filter-btn" onclick="setFilter('hard', this)">
          Сложные
        </button>
        <button class="filter-btn" onclick="setFilter('done', this)">
          Изученные
        </button>
        <button class="filter-btn" onclick="setFilter('undone', this)">
          Неизученные
        </button>
      </div>

      <div id="tasksRoot"></div>
    </div>

    <div class="float-counter" id="floatCounter">✅ 0 / 200</div>

    <script>
      const TOPICS = [
        {
          id: "obj_basics",
          title: "Объекты: основы",
          icon: "📦",
          color: "#06b6d4",
          tasks: [
            {
              d: "easy",
              q: "Создай объект user с полями name, age, isAdmin и выведи каждое поле.",
              a: "const user = { name: 'John', age: 30, isAdmin: true }; console.log(user.name, user['age'], user.isAdmin);"
            },
            {
              d: "easy",
              q: "Как получить доступ к свойству объекта через точку и через квадратные скобки? В чём разница?",
              a: "Через точку: obj.prop (статический ключ). Через скобки: obj['prop'] (можно вычислять ключи, использовать пробелы, спецсимволы)."
            },
            {
              d: "easy",
              q: "Добавь новое свойство email в уже существующий объект.",
              a: "obj.email = 'test@mail.com' или obj['email'] = 'test@mail.com'"
            },
            {
              d: "easy",
              q: "Удали свойство из объекта с помощью оператора delete.",
              a: "delete obj.property;"
            },
            {
              d: "easy",
              q: "Как проверить существует ли свойство в объекте? Покажи два способа.",
              a: "'prop' in obj; obj.hasOwnProperty('prop'); obj.prop !== undefined (осторожно, если значение undefined)"
            },
            {
              d: "easy",
              q: "Что такое оператор in? Напиши пример проверки наличия ключа.",
              a: "Оператор проверяет наличие свойства в объекте (включая прототип). Пример: 'name' in user → true/false"
            },
            {
              d: "easy",
              q: "Перебери все ключи объекта с помощью цикла for...in.",
              a: "for (let key in obj) { console.log(key, obj[key]); }"
            },
            {
              d: "easy",
              q: "Что такое вычисляемые свойства (computed properties)? Напиши пример с переменной в качестве ключа.",
              a: "Свойства, где ключ вычисляется из выражения: const key = 'age'; const obj = { [key]: 30 };"
            },
            {
              d: "easy",
              q: "Что такое shorthand-свойства объекта? Перепиши {name: name, age: age} в короткой форме.",
              a: "Сокращённая запись, когда имя переменной совпадает с ключом: { name, age }"
            },
            {
              d: "easy",
              q: "Как получить массив всех ключей объекта? Как получить массив всех значений?",
              a: "Object.keys(obj) – ключи; Object.values(obj) – значения."
            },
            {
              d: "easy",
              q: "Как получить массив пар [ключ, значение] из объекта?",
              a: "Object.entries(obj)"
            },
            {
              d: "easy",
              q: "Создай объект с вложенным объектом и обратись к свойству вложенного объекта.",
              a: "const user = { profile: { name: 'John' } }; user.profile.name или user['profile']['name']"
            },
            {
              d: "easy",
              q: "Что такое деструктуризация объекта? Извлеки name и age из объекта через деструктуризацию.",
              a: "const { name, age } = obj;"
            },
            {
              d: "easy",
              q: "Как задать значение по умолчанию при деструктуризации?",
              a: "const { name = 'Аноним', age = 18 } = obj;"
            },
            {
              d: "easy",
              q: "Что такое spread-оператор ... для объектов? Объедини два объекта через него.",
              a: "const merged = { ...obj1, ...obj2 }; (позднее свойство перезаписывает раннее)"
            },
            {
              d: "medium",
              q: "Что такое Object.keys(), Object.values(), Object.entries()? Напиши пример использования каждого.",
              a: "Object.keys(obj) → ['name','age']; Object.values(obj) → ['John',30]; Object.entries(obj) → [['name','John'],['age',30]]"
            },
            {
              d: "medium",
              q: "Как создать объект из массива пар [ключ, значение] с помощью Object.fromEntries()?",
              a: "Object.fromEntries([['name','John'], ['age',30]]) → { name: 'John', age: 30 }"
            },
            {
              d: "medium",
              q: "Что делает Object.freeze()? Напиши пример — покажи что объект нельзя изменить после заморозки.",
              a: "Object.freeze(obj) запрещает добавлять/удалять/изменять свойства. obj.name = 'new' не сработает (в strict mode ошибка)."
            },
            {
              d: "medium",
              q: "Что делает Object.seal()? Чем отличается от Object.freeze()?",
              a: "Object.seal(obj) запрещает добавлять/удалять свойства, но позволяет изменять существующие. freeze полностью блокирует изменения."
            },
            {
              d: "medium",
              q: "Напиши функцию pick(obj, keys) возвращающую новый объект только с указанными ключами.",
              a: "const pick = (obj, keys) => Object.fromEntries(keys.filter(k => k in obj).map(k => [k, obj[k]]));"
            },
            {
              d: "medium",
              q: "Напиши функцию omit(obj, keys) возвращающую объект без указанных ключей.",
              a: "const omit = (obj, keys) => Object.fromEntries(Object.entries(obj).filter(([k]) => !keys.includes(k)));"
            },
            {
              d: "medium",
              q: "Что такое Object.defineProperty()? Как создать свойство только для чтения?",
              a: "Object.defineProperty(obj, 'prop', { value: 42, writable: false, enumerable: true, configurable: true });"
            },
            {
              d: "hard",
              q: "Что такое дескрипторы свойств (writable, enumerable, configurable)? Как их посмотреть?",
              a: "Дескрипторы – объекты с флагами свойства. writable – можно изменять, enumerable – видно в циклах, configurable – можно удалять/менять дескриптор. Получить: Object.getOwnPropertyDescriptor(obj, 'prop')"
            },
            {
              d: "hard",
              q: "Реализуй функцию deepFreeze(obj) рекурсивно замораживающую все вложенные объекты.",
              a: "function deepFreeze(obj) { Object.freeze(obj); Object.values(obj).forEach(v => typeof v === 'object' && v !== null && deepFreeze(v)); return obj; }"
            },
            {
              d: "hard",
              q: "Что такое геттеры и сеттеры (get/set) в объектах? Напиши объект с вычисляемым свойством через геттер.",
              a: "const user = { firstName: 'John', lastName: 'Doe', get fullName() { return this.firstName + ' ' + this.lastName; }, set fullName(value) { [this.firstName, this.lastName] = value.split(' '); } };"
            },
          ],
        },
        {
          id: "obj_copy",
          title: "Копирование объектов и ссылки",
          icon: "📋",
          color: "#818cf8",
          tasks: [
            {
              d: "easy",
              q: "Почему при присваивании объекта переменной копируется ссылка, а не сам объект?",
              a: "Объекты хранятся в памяти по ссылке. Переменная хранит адрес в памяти, а не сам объект, поэтому при присваивании копируется ссылка."
            },
            {
              d: "easy",
              q: "Что произойдёт если изменить свойство объекта через вторую переменную ссылающуюся на тот же объект?",
              a: "Изменения увидят обе переменные, так как они ссылаются на один и тот же объект в памяти."
            },
            {
              d: "easy",
              q: "Как сделать поверхностную копию объекта через Object.assign()?",
              a: "const copy = Object.assign({}, original);"
            },

      const STORAGE_KEY = "jsTasks5_done";
      let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      let currentFilter = "all";
      let searchQuery = "";
      const TOTAL = 200;

      function renderAll() {
        const root = document.getElementById("tasksRoot");
        root.innerHTML = "";

        let easy = 0,
          med = 0,
          hard = 0;
        TOPICS.forEach((t) =>
          t.tasks.forEach((tk) => {
            if (tk.d === "easy") easy++;
            else if (tk.d === "medium") med++;
            else hard++;
          }),
        );
        document.getElementById("easyCount").textContent = easy;
        document.getElementById("medCount").textContent = med;
        document.getElementById("hardCount").textContent = hard;

        let num = 0;
        TOPICS.forEach((topic) => {
          const sec = document.createElement("section");
          sec.className = "topic-section";

          const hdr = document.createElement("div");
          hdr.className = "topic-header";
          hdr.innerHTML = `
      <div class="topic-icon" style="background:${topic.color}1a;color:${topic.color}">${topic.icon}</div>
      <span class="topic-title">${topic.title}</span>
      <span class="topic-count">${topic.tasks.length} ответов</span>
    `;
          sec.appendChild(hdr);

          const grid = document.createElement("div");
          grid.className = "task-grid";

          topic.tasks.forEach((task, i) => {
            num++;
            const id = `${topic.id}_${i}`;
            const isDone = !!done[id];

            const card = document.createElement("div");
            card.className = "task-card" + (isDone ? " done" : "");
            card.style.setProperty("--card-color", topic.color);
            card.dataset.diff = task.d;
            card.dataset.done = isDone ? "1" : "0";
            card.dataset.text = (task.q + ' ' + task.a).replace(/<[^>]+>/g, "").toLowerCase();

            const labels = {
              easy: "Лёгкое",
              medium: "Среднее",
              hard: "Сложное",
            };
            const classes = {
              easy: "diff-easy",
              medium: "diff-medium",
              hard: "diff-hard",
            };

            card.innerHTML = `
        <div class="task-top">
          <span class="task-num">#${String(num).padStart(3, "0")}</span>
          <span class="difficulty ${classes[task.d]}">${labels[task.d]}</span>
        </div>
        <div class="question-text">❓ ${task.q}</div>
        <div class="answer-text">✅ ${task.a}</div>
        <div class="task-actions">
          <button class="btn-done" onclick="toggleDone('${id}',this)">
            ${isDone ? "✅ Изучено" : "○ Отметить изученным"}
          </button>
        </div>
      `;
            grid.appendChild(card);
          });

          sec.appendChild(grid);
          root.appendChild(sec);
        });

        updateProgress();
        applyFilter();
      }

      function toggleDone(id, btn) {
        done[id] = !done[id];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
        const card = btn.closest(".task-card");
        card.classList.toggle("done", done[id]);
        card.dataset.done = done[id] ? "1" : "0";
        btn.innerHTML = done[id] ? "✅ Изучено" : "○ Отметить изученным";
        updateProgress();
      }

      function updateProgress() {
        const cnt = Object.values(done).filter(Boolean).length;
        const pct = ((cnt / TOTAL) * 100).toFixed(1);
        document.getElementById("progressBar").style.width = pct + "%";
        document.getElementById("progressText").textContent =
          `${cnt} / ${TOTAL}`;
        document.getElementById("floatCounter").textContent =
          `✅ ${cnt} / ${TOTAL}`;
      }

      function setFilter(f, btn) {
        currentFilter = f;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        applyFilter();
      }

      function filterTasks() {
        searchQuery = document
          .getElementById("searchInput")
          .value.toLowerCase();
        applyFilter();
      }

      function applyFilter() {
        document.querySelectorAll(".task-card").forEach((card) => {
          let show = true;
          const d = card.dataset.diff;
          const dn = card.dataset.done === "1";
          if (currentFilter === "easy") show = d === "easy";
          else if (currentFilter === "medium") show = d === "medium";
          else if (currentFilter === "hard") show = d === "hard";
          else if (currentFilter === "done") show = dn;
          else if (currentFilter === "undone") show = !dn;
          if (searchQuery && !card.dataset.text.includes(searchQuery))
            show = false;
          card.classList.toggle("hidden", !show);
        });

        document.querySelectorAll(".topic-section").forEach((sec) => {
          const vis = [...sec.querySelectorAll(".task-card")].some(
            (c) => !c.classList.contains("hidden"),
          );
          sec.classList.toggle("hidden", !vis);
        });
      }

      function resetAll() {
        if (confirm("Сбросить весь прогресс?")) {
          done = {};
          localStorage.removeItem(STORAGE_KEY);
          renderAll();
        }
      }

      renderAll();
    </script>
