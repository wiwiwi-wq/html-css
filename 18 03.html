<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Tasks — Ответы по типам данных</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap");

      :root {
        --bg: #0b1020;
        --surface: #11172a;
        --card: #161d34;
        --border: #2a355a;
        --text: #e5ecff;
        --muted: #94a3c4;
        --accent: #5eead4;
        --accent2: #60a5fa;
        --accent3: #f59e0b;
        --accent4: #22c55e;
        --accent5: #ef4444;
        --accent6: #a78bfa;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Inter, sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(96, 165, 250, 0.12),
            transparent 30%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(94, 234, 212, 0.1),
            transparent 25%
          ),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      .container {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 20px 80px;
      }

      header {
        padding: 64px 0 36px;
        text-align: center;
      }

      .badge {
        display: inline-block;
        padding: 8px 16px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        color: #061018;
        margin-bottom: 18px;
      }

      h1 {
        font-size: clamp(2.4rem, 6vw, 5rem);
        line-height: 1.05;
        font-weight: 900;
        background: linear-gradient(
          135deg,
          #fff,
          var(--accent2),
          var(--accent)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 12px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 1.05rem;
        max-width: 760px;
        margin: 0 auto 34px;
        line-height: 1.6;
      }

      .stats {
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 28px;
      }

      .stat-chip {
        background: rgba(22, 29, 52, 0.9);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 18px;
        display: flex;
        gap: 10px;
        align-items: center;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .stat-chip .num {
        color: var(--accent);
        font-size: 1.35rem;
        font-weight: 800;
      }

      .toolbar,
      .progress-wrap {
        background: rgba(22, 29, 52, 0.9);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px 18px;
        margin-bottom: 22px;
        backdrop-filter: blur(10px);
      }

      .progress-wrap {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      .progress-label {
        font-weight: 700;
        white-space: nowrap;
      }

      .progress-bar {
        flex: 1;
        min-width: 220px;
        height: 10px;
        background: #0e1425;
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid var(--border);
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent2), var(--accent));
        transition: width 0.35s ease;
      }

      .progress-count {
        font-family: "JetBrains Mono", monospace;
        color: var(--accent);
        font-size: 0.9rem;
        white-space: nowrap;
      }

      .btn-reset {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 10px 14px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
        transition: 0.2s;
      }

      .btn-reset:hover {
        color: white;
        border-color: var(--accent5);
      }

      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .search-wrap {
        flex: 1;
        min-width: 240px;
        position: relative;
      }

      .search-wrap input {
        width: 100%;
        padding: 12px 14px 12px 42px;
        border-radius: 12px;
        background: #0e1425;
        border: 1px solid var(--border);
        color: var(--text);
        outline: none;
        font-size: 0.95rem;
      }

      .search-wrap::before {
        content: "🔎";
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.95rem;
      }

      .filter-btn {
        background: #0e1425;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 10px 14px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
        transition: 0.2s;
      }

      .filter-btn:hover,
      .filter-btn.active {
        color: white;
        border-color: var(--accent2);
        background: rgba(96, 165, 250, 0.12);
      }

      .topic-section {
        margin-top: 34px;
      }

      .topic-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: rgba(11, 16, 32, 0.92);
        backdrop-filter: blur(12px);
        z-index: 10;
      }

      .topic-icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-size: 1.4rem;
        flex-shrink: 0;
      }

      .topic-title {
        font-size: 1.32rem;
        font-weight: 800;
      }

      .topic-count {
        margin-left: auto;
        color: var(--muted);
        border: 1px solid var(--border);
        background: #0e1425;
        border-radius: 999px;
        padding: 5px 11px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
      }

      .task-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 14px;
      }

      .task-card {
        background: rgba(22, 29, 52, 0.94);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px;
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          box-shadow 0.18s ease;
        position: relative;
        overflow: hidden;
      }

      .task-card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--card-color, var(--accent2)),
          transparent
        );
        opacity: 0;
        transition: 0.18s;
      }

      .task-card:hover {
        transform: translateY(-3px);
        border-color: var(--card-color, var(--accent2));
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
      }

      .task-card:hover::before {
        opacity: 1;
      }

      .task-card.done {
        border-color: rgba(34, 197, 94, 0.4);
        background: rgba(34, 197, 94, 0.08);
      }

      .task-card.done::before {
        opacity: 1;
        background: linear-gradient(90deg, var(--accent4), transparent);
      }

      .task-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .task-num {
        font-family: "JetBrains Mono", monospace;
        color: var(--muted);
        background: #0e1425;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 4px 8px;
        font-size: 0.76rem;
      }

      .difficulty {
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .diff-easy {
        background: rgba(34, 197, 94, 0.14);
        color: var(--accent4);
      }
      .diff-medium {
        background: rgba(245, 158, 11, 0.14);
        color: var(--accent3);
      }
      .diff-hard {
        background: rgba(239, 68, 68, 0.14);
        color: var(--accent5);
      }

      .task-text {
        font-size: 0.94rem;
        line-height: 1.65;
        color: var(--text);
        margin-bottom: 16px;
      }

      .task-text code {
        font-family: "JetBrains Mono", monospace;
        background: #0e1425;
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 2px 6px;
        color: var(--accent);
        font-size: 0.85em;
      }

      .task-actions {
        display: flex;
        gap: 8px;
      }

      .btn-done {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 9px 14px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
        transition: 0.18s;
      }

      .btn-done:hover {
        border-color: var(--accent4);
        color: var(--accent4);
      }

      .task-card.done .btn-done {
        color: var(--accent4);
        border-color: var(--accent4);
        background: rgba(34, 197, 94, 0.08);
      }

      .hidden {
        display: none !important;
      }

      .float-counter {
        position: fixed;
        right: 18px;
        bottom: 18px;
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        color: #041018;
        padding: 14px 18px;
        border-radius: 18px;
        font-weight: 900;
        box-shadow: 0 16px 40px rgba(96, 165, 250, 0.35);
        z-index: 100;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 999px;
      }

      @media (max-width: 680px) {
        .task-grid {
          grid-template-columns: 1fr;
        }
        .float-counter {
          right: 12px;
          bottom: 12px;
          padding: 10px 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="badge">✦ JavaScript Practice</div>
        <h1>200 ответов<br />по структурам данных</h1>
        <p class="subtitle">
          Типы данных · примитивы · числа · строки · массивы · Map/Set · Date ·
          JSON
        </p>

        <div class="stats">
          <div class="stat-chip"><span class="num">200</span> ответов</div>
          <div class="stat-chip"><span class="num">13</span> тем</div>
          <div class="stat-chip">
            <span class="num" id="easyCount">0</span> лёгких
          </div>
          <div class="stat-chip">
            <span class="num" id="medCount">0</span> средних
          </div>
          <div class="stat-chip">
            <span class="num" id="hardCount">0</span> сложных
          </div>
        </div>
      </header>

      <div class="progress-wrap">
        <span class="progress-label">⚡ Прогресс</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progressBar"></div>
        </div>
        <span class="progress-count" id="progressText">0 / 200</span>
        <button class="btn-reset" onclick="resetAll()">Сбросить</button>
      </div>

      <div class="toolbar">
        <div class="search-wrap">
          <input
            type="text"
            id="searchInput"
            placeholder="Поиск ответа..."
            oninput="filterTasks()"
          />
        </div>
        <button class="filter-btn active" onclick="setFilter('all', this)">
          Все
        </button>
        <button class="filter-btn" onclick="setFilter('easy', this)">
          Лёгкие
        </button>
        <button class="filter-btn" onclick="setFilter('medium', this)">
          Средние
        </button>
        <button class="filter-btn" onclick="setFilter('hard', this)">
          Сложные
        </button>
        <button class="filter-btn" onclick="setFilter('done', this)">
          Выполненные
        </button>
        <button class="filter-btn" onclick="setFilter('undone', this)">
          Невыполненные
        </button>
      </div>

      <div id="tasksRoot"></div>
    </div>

    <div class="float-counter" id="floatCounter">✅ 0 / 200</div>

    <script>
      const TOPICS = [
        {
          id: "types",
          title: "Типы данных",
          icon: "🧩",
          color: "#60a5fa",
          tasks: [
            {
              d: "easy",
              t: "Примитивные типы: string, number, bigint, boolean, undefined, symbol, null. Всё остальное — объекты.",
            },
            {
              d: "easy",
              t: "Примитивы — неизменяемые значения, хранятся по значению. Объекты — изменяемые, хранятся по ссылке.",
            },
            {
              d: "easy",
              t: '<code>typeof 42</code> → "number", <code>typeof "hi"</code> → "string", <code>typeof true</code> → "boolean".',
            },
            {
              d: "easy",
              t: '<code>typeof undefined</code> → "undefined". <code>typeof null</code> → "object" — официально признанная ошибка языка.',
            },
            {
              d: "easy",
              t: '<code>typeof []</code> → "object", <code>typeof {}</code> → "object", <code>typeof Symbol("id")</code> → "symbol", <code>typeof 10n</code> → "bigint".',
            },
            {
              d: "easy",
              t: '<code>function getType(value) { return value === null ? "null" : typeof value; }</code>',
            },
            {
              d: "easy",
              t: "BigInt — тип для целых чисел произвольной точности. Создаётся суффиксом n: <code>123n</code> или <code>BigInt(123)</code>.",
            },
            {
              d: "medium",
              t: "<code>Array.isArray(arr)</code> для массива, <code>typeof obj === 'object' && obj !== null</code> для объекта, <code>typeof fn === 'function'</code> для функции, остальное примитивы.",
            },
            {
              d: "medium",
              t: "<code>typeof</code> для массива вернёт 'object', а <code>[] instanceof Array</code> вернёт true. instanceof проверяет цепочку прототипов.",
            },
            {
              d: "medium",
              t: "<code>function getHumanType(value) { if (value === null) return 'null'; if (Array.isArray(value)) return 'array'; return typeof value; }</code>",
            },
            {
              d: "medium",
              t: "Falsy: false, 0, -0, 0n, '', null, undefined, NaN. Truthy: все остальные, включая пустой массив [], пустой объект {}.",
            },
            {
              d: "medium",
              t: "Функция — объект, у неё есть свойства и методы. <code>function fn() {}; fn.prop = 'value';</code>",
            },
            {
              d: "hard",
              t: "<code>function isPlainObject(value) { return Object.prototype.toString.call(value) === '[object Object]'; }</code>",
            },
            {
              d: "hard",
              t: "<code>typeof []</code> → object, но <code>Object.prototype.toString.call([])</code> → '[object Array]', <code>Array.isArray([])</code> → true.",
            },
            {
              d: "hard",
              t: "<code>function typeStats(arr) { return arr.reduce((acc, val) => { let t = val === null ? 'null' : typeof val; acc[t] = (acc[t] || 0) + 1; return acc; }, {}); }</code>",
            },
          ],
        },

        {
          id: "primitive_methods",
          title: "Методы примитивов",
          icon: "✨",
          color: "#5eead4",
          tasks: [
            {
              d: "easy",
              t: "При вызове метода примитив временно оборачивается в объект-обёртку (String, Number, Boolean), который и вызывает метод.",
            },
            {
              d: "easy",
              t: '"hello".toUpperCase() → "HELLO". Создаётся временный объект String, вызывается метод, затем объект уничтожается.',
            },
            {
              d: "easy",
              t: '<code>(123.456).toFixed(2)</code> → "123.46" (строка, округлённая до двух знаков).',
            },
            {
              d: "easy",
              t: '<code>true.toString()</code> → "true". Boolean оборачивается в объект Boolean, вызывается метод toString.',
            },
            {
              d: "easy",
              t: "У null и undefined нет объектов-обёрток, поэтому попытка вызвать метод вызывает TypeError.",
            },
            {
              d: "medium",
              t: "let str = 'hello'; str.toUpperCase(); — внутри происходит new String(str).toUpperCase(); затем объект удаляется.",
            },
            {
              d: "medium",
              t: "Примитивная строка — неизменяемое значение. new String('abc') — объект, typeof вернёт 'object', сравнение по ссылке.",
            },
            {
              d: "medium",
              t: "new Number(5) — объект, в условиях преобразуется в число. 5 === new Number(5) → false, 5 == new Number(5) → true.",
            },
            {
              d: "medium",
              t: "<code>function callMethod(value) { if (typeof value === 'string') return value.toUpperCase(); if (typeof value === 'number') return value.toFixed(2); return value; }</code>",
            },
            {
              d: "hard",
              t: '"abc".x = 10 — строка временно оборачивается, свойство присваивается временному объекту, который сразу удаляется, свойство теряется.',
            },
            {
              d: "hard",
              t: "Обёртки создают объекты, которые ведут себя неожиданно: typeof new String('') → 'object', сравнения по ссылке, медленнее.",
            },
            {
              d: "hard",
              t: "// Временный объект-обёртка: 1. Примитив (строка/число/булеан) пытается получить доступ к свойству. 2. Создаётся объект соответствующего типа (String/Number/Boolean). 3. Выполняется операция. 4. Объект уничтожается. //",
            },
          ],
        },

        {
          id: "numbers",
          title: "Числа",
          icon: "🔢",
          color: "#f59e0b",
          tasks: [
            {
              d: "easy",
              t: "Тип number хранит числа с плавающей точкой двойной точности (64-bit IEEE 754), целые и дробные числа, ±Infinity, NaN.",
            },
            {
              d: "easy",
              t: "0.1 + 0.2 = 0.30000000000000004. Ошибка из-за представления чисел с плавающей точкой в двоичной системе.",
            },
            {
              d: "easy",
              t: "parseInt читает целое число из строки до первого нечислового символа, parseFloat читает число с плавающей точкой.",
            },
            {
              d: "easy",
              t: 'Number("123") → 123, Number("123px") → NaN (строгое преобразование).',
            },
            {
              d: "easy",
              t: "Math.round(4.5) → 5, Math.floor(4.5) → 4, Math.ceil(4.5) → 5.",
            },
            {
              d: "easy",
              t: "<code>Math.floor(Math.random() * 10) + 1</code>",
            },
            {
              d: "easy",
              t: "NaN — Not-a-Number, специальное значение. Проверка: <code>isNaN(value)</code> или <code>Number.isNaN(value)</code>.",
            },
            {
              d: "medium",
              t: "<code>function isFiniteNumber(value) { return typeof value === 'number' && isFinite(value); }</code>",
            },
            {
              d: "medium",
              t: "isNaN() преобразует аргумент в число перед проверкой. Number.isNaN() проверяет, что значение точно NaN (без преобразования).",
            },
            {
              d: "medium",
              t: "<code>function roundToTwo(num) { return Math.round(num * 100) / 100; }</code>",
            },
            {
              d: "medium",
              t: "<code>(5).toString(2)</code> → '101'. Число 5 в двоичной системе.",
            },
            {
              d: "medium",
              t: "Infinity получается при делении на ноль или при переполнении: <code>1/0 → Infinity, -1/0 → -Infinity</code>.",
            },
            {
              d: "medium",
              t: "<code>function sumDigits(n) { return String(Math.abs(n)).split('').reduce((s, d) => s + +d, 0); }</code>",
            },
            {
              d: "hard",
              t: "Это Number.MAX_SAFE_INTEGER, максимальное целое, которое можно точно представить в double (2^53 - 1).",
            },
            {
              d: "hard",
              t: "BigInt и number нельзя смешивать: <code>1n + 1 → TypeError</code>. Нужно явно преобразовывать: <code>Number(1n) + 1</code> или <code>1n + BigInt(1)</code>.",
            },
            {
              d: "hard",
              t: "<code>function calculate(expr) { try { return eval(expr); } catch { return 'Ошибка'; } }</code> — но лучше использовать Function или парсер.",
            },
          ],
        },

        {
          id: "strings",
          title: "Строки",
          icon: "🔤",
          color: "#a78bfa",
          tasks: [
            {
              d: "easy",
              t: "'одинарные', \"двойные\", `шаблонные`.",
            },
            {
              d: "easy",
              t: "Шаблонные строки обрамляются обратными кавычками: <code>`Привет, ${name}!`</code>",
            },
            {
              d: "easy",
              t: "'hello'.toUpperCase() → 'HELLO', 'HELLO'.toLowerCase() → 'hello'.",
            },
            {
              d: "easy",
              t: "'hello'.length → 5",
            },
            {
              d: "easy",
              t: "str[0], str[str.length - 1] или str.charAt(0), str.charAt(str.length - 1).",
            },
            {
              d: "easy",
              t: "slice(start, end) — от start до end (не включая end), substring(start, end) — аналогично, substr(start, length) — устаревший.",
            },
            {
              d: "easy",
              t: "'Hello world'.includes('world') → true, 'Hello'.startsWith('He') → true, 'Hello'.endsWith('lo') → true.",
            },

              d: "easy",
              t: "JSON — текстовый формат обмена данными. В JSON ключи обязательно в двойных кавычках, нет функций, undefined, символов.",
            },
            {
              d: "easy",
              t: "JSON.stringify({a:1,b:2}) → '{\"a\":1,\"b\":2}'",
            },
            {
              d: "easy",
              t: "JSON.parse('{\"a\":1,\"b\":2}') → {a:1,b:2}",
            },
            {
              d: "easy",
              t: "Строки, числа, булевы, null, объекты, массивы. Не сериализуются: функции, undefined, Symbol, циклические ссылки.",
            },
            {
              d: "easy",
              t: "Превращаются в null, если встречаются в массиве, или просто пропускаются, если в объекте.",
            },
            {
              d: "easy",
              t: "Date превращается в строку в формате ISO.",
            },
            {
              d: "medium",
              t: "JSON.stringify(obj, ['name', 'age'])",
            },
            {
              d: "medium",
              t: "JSON.stringify(obj, (key, value) => typeof value === 'number' ? value * 2 : value)",
            },
            {
              d: "medium",
              t: "JSON.stringify(obj, null, 2)",
            },
            {
              d: "medium",
              t: "JSON.parse(json, (key, value) => key === 'date' ? new Date(value) : value)",
            },
            {
              d: "medium",
              t: "let json = '{\"date\":\"2024-01-01T00:00:00.000Z\"}'; JSON.parse(json, (k,v) => k === 'date' ? new Date(v) : v)",
            },
            {
              d: "medium",
              t: "toJSON() — метод, который вызывается при JSON.stringify для кастомной сериализации.",
            },
            {
              d: "medium",
              t: "let obj = { data: 123, toJSON() { return this.data * 2; } }; JSON.stringify(obj) → '246'",
            },
            {
              d: "medium",
              t: "JSON.stringify([...map])",
            },
            {
              d: "medium",
              t: "JSON.stringify([...set])",
            },
            {
              d: "hard",
              t: "Циклические ссылки вызывают ошибку, потому что JSON не может их представить в виде текста.",
            },
            {
              d: "hard",
              t: "function safeStringify(obj) { let cache = new Set(); return JSON.stringify(obj, (k,v) => { if (typeof v === 'object' && v !== null) { if (cache.has(v)) return; cache.add(v); } return v; }); }",
            },
            {
              d: "hard",
              t: "function saveState(obj) { localStorage.setItem('state', JSON.stringify(obj)); } function loadState() { return JSON.parse(localStorage.getItem('state') || 'null'); }",
            },
            {
              d: "hard",
              t: "let inner = { value: 123, toJSON() { return 'inner'; } }; let outer = { inner, toJSON() { return { inner: this.inner }; } };",
            },
          ],
        },
      ];

      const STORAGE_KEY = "jsTasks6_done";
      let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      let currentFilter = "all";
      let searchQuery = "";
      const TOTAL = 200;

      function renderAll() {
        const root = document.getElementById("tasksRoot");
        root.innerHTML = "";

        let easy = 0,
          medium = 0,
          hard = 0;
        TOPICS.forEach((topic) =>
          topic.tasks.forEach((task) => {
            if (task.d === "easy") easy++;
            else if (task.d === "medium") medium++;
            else hard++;
          }),
        );

        document.getElementById("easyCount").textContent = easy;
        document.getElementById("medCount").textContent = medium;
        document.getElementById("hardCount").textContent = hard;

        let taskNumber = 0;

        TOPICS.forEach((topic) => {
          const section = document.createElement("section");
          section.className = "topic-section";

          const header = document.createElement("div");
          header.className = "topic-header";
          header.innerHTML = `
      <div class="topic-icon" style="background:${topic.color}22;color:${topic.color}">${topic.icon}</div>
      <div class="topic-title">${topic.title}</div>
      <div class="topic-count">${topic.tasks.length} ответов</div>
    `;
          section.appendChild(header);

          const grid = document.createElement("div");
          grid.className = "task-grid";

          topic.tasks.forEach((task, index) => {
            taskNumber++;
            const id = `${topic.id}_${index}`;
            const isDone = !!done[id];

            const labels = {
              easy: "Лёгкое",
              medium: "Среднее",
              hard: "Сложное",
            };
            const diffClasses = {
              easy: "diff-easy",
              medium: "diff-medium",
              hard: "diff-hard",
            };

            const card = document.createElement("div");
            card.className = `task-card${isDone ? " done" : ""}`;
            card.style.setProperty("--card-color", topic.color);
            card.dataset.id = id;
            card.dataset.diff = task.d;
            card.dataset.done = isDone ? "1" : "0";
            card.dataset.text = task.t.replace(/<[^>]+>/g, "").toLowerCase();

            card.innerHTML = `
        <div class="task-top">
          <span class="task-num">#${String(taskNumber).padStart(3, "0")}</span>
          <span class="difficulty ${diffClasses[task.d]}">${labels[task.d]}</span>
        </div>
        <div class="task-text">${task.t}</div>
        <div class="task-actions">
          <button class="btn-done" onclick="toggleDone('${id}', this)">
            ${isDone ? "✅ Изучено" : "○ Изучить"}
          </button>
        </div>
      `;

            grid.appendChild(card);
          });

          section.appendChild(grid);
          root.appendChild(section);
        });

        updateProgress();
        applyFilter();
      }

      function toggleDone(id, btn) {
        done[id] = !done[id];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(done));

        const card = btn.closest(".task-card");
        const isDone = !!done[id];

        card.classList.toggle("done", isDone);
        card.dataset.done = isDone ? "1" : "0";
        btn.textContent = isDone ? "✅ Изучено" : "○ Изучить";

        updateProgress();
        applyFilter();
      }

      function updateProgress() {
        const completed = Object.values(done).filter(Boolean).length;
        const percent = ((completed / TOTAL) * 100).toFixed(1);
        document.getElementById("progressBar").style.width = percent + "%";
        document.getElementById("progressText").textContent =
          `${completed} / ${TOTAL}`;
        document.getElementById("floatCounter").textContent =
          `✅ ${completed} / ${TOTAL}`;
      }

      function setFilter(filter, btn) {
        currentFilter = filter;
        document
          .querySelectorAll(".filter-btn")
          .forEach((el) => el.classList.remove("active"));
        btn.classList.add("active");
        applyFilter();
      }

      function filterTasks() {
        searchQuery = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim();
        applyFilter();
      }

      function applyFilter() {
        document.querySelectorAll(".task-card").forEach((card) => {
          const diff = card.dataset.diff;
          const isDone = card.dataset.done === "1";
          const text = card.dataset.text;

          let visible = true;

          if (currentFilter === "easy") visible = diff === "easy";
          else if (currentFilter === "medium") visible = diff === "medium";
          else if (currentFilter === "hard") visible = diff === "hard";
          else if (currentFilter === "done") visible = isDone;
          else if (currentFilter === "undone") visible = !isDone;

          if (searchQuery && !text.includes(searchQuery)) visible = false;
          card.classList.toggle("hidden", !visible);
        });

        document.querySelectorAll(".topic-section").forEach((section) => {
          const hasVisibleCards = [
            ...section.querySelectorAll(".task-card"),
          ].some((card) => !card.classList.contains("hidden"));
          section.classList.toggle("hidden", !hasVisibleCards);
        });
      }

      function resetAll() {
        if (confirm("Сбросить весь прогресс?")) {
          done = {};
          localStorage.removeItem(STORAGE_KEY);
          renderAll();
        }
      }

      renderAll();
    </script>
  </body>
</html>
